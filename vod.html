<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>VOD Player</title>
  <style>
    :root {
      --bg: #000;
      --accent: #00ff9d;
      --text: #fff;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', Roboto, Arial, sans-serif;
      overflow: hidden;
    }
    video {
      width: 100%;
      height: 100%;
      position: fixed;
      top: 0; left: 0;
      background: #000;
      object-fit: contain;
    }
    .now-playing {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      padding: 8px 20px;
      border-radius: 50px;
      font-size: 19px;
      font-weight: 600;
      z-index: 10;
      opacity: 0;
      transition: opacity 0.5s;
      white-space: nowrap;
      max-width: 90%;
      overflow: hidden;
      text-overflow: ellipsis;
      pointer-events: none;
    }
    .now-playing.show {
      opacity: 1;
    }
    .menu-btn {
      position: fixed;
      top: 12px;
      left: 12px;
      padding: 10px 14px;
      background: rgba(0,0,0,0.6);
      border: 2px solid var(--accent);
      border-radius: 50%;
      color: white;
      font-size: 22px;
      z-index: 15;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.4s;
    }
    .menu-btn.show {
      opacity: 1;
    }
    .sidebar {
      position: fixed;
      top: 0;
      left: -340px;
      width: 340px;
      height: 100%;
      background: rgba(0,0,0,0.92);
      backdrop-filter: blur(16px);
      transition: left 0.4s ease;
      z-index: 20;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .sidebar.visible {
      left: 0;
    }
    .search {
      width: 100%;
      padding: 12px 16px;
      border-radius: 12px;
      background: rgba(255,255,255,0.12);
      border: none;
      color: white;
      font-size: 17px;
      outline: none;
    }
    .channel-list {
      flex: 1;
      overflow-y: auto;
    }
    .channel {
      padding: 12px 16px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.15s;
      font-size: 16px;
    }
    .channel:hover,
    .channel:focus {
      background: rgba(0,255,157,0.18);
    }
    .channel.active {
      background: var(--accent);
      color: #000;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <video id="video" playsinline controls></video>

  <div id="nowPlaying" class="now-playing">Select a video to start</div>
  <button id="menuBtn" class="menu-btn">☰</button>

  <aside id="sidebar" class="sidebar">
    <input type="text" id="search" class="search" placeholder="Search videos…">
    <div id="channelList" class="channel-list"></div>
  </aside>

<script>
// ────────────────────────────────────────────────
const video       = document.getElementById('video');
const nowPlaying  = document.getElementById('nowPlaying');
const menuBtn     = document.getElementById('menuBtn');
const sidebar     = document.getElementById('sidebar');
const channelList = document.getElementById('channelList');
const searchInput = document.getElementById('search');

let channels = [];
let currentIndex = -1;

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function showUI() {
  nowPlaying.classList.add('show');
  menuBtn.classList.add('show');
}

function hideUI() {
  if (sidebar.classList.contains('visible')) return;
  nowPlaying.classList.remove('show');
  menuBtn.classList.remove('show');
}

// Load & parse M3U
fetch('https://raw.githubusercontent.com/rsingh-fbd/R.singh/refs/heads/main/vod.m3u?t=' + Date.now())
  .then(r => r.text())
  .then(text => {
    const lines = text.split(/\r?\n/);
    channels = [];
    for (let i = 0; i < lines.length; i++) {
      if (lines[i].startsWith('#EXTINF:')) {
        const parts = lines[i].split(',');
        const title = parts.slice(1).join(',').trim();
        const url = lines[i + 1]?.trim();
        if (url && !url.startsWith('#')) {
          channels.push({ title, url });
        }
        i++;
      }
    }
    renderList();
    if (channels.length > 0) playVideo(0);
  })
  .catch(err => {
    console.error(err);
    nowPlaying.textContent = "Failed to load playlist";
  });

// Render video list
function renderList() {
  channelList.innerHTML = '';
  const term = searchInput.value.toLowerCase().trim();

  channels.forEach((item, idx) => {
    if (term && !item.title.toLowerCase().includes(term)) return;

    const div = document.createElement('div');
    div.className = 'channel';
    div.innerHTML = escapeHtml(item.title);
    div.dataset.idx = idx;

    if (idx === currentIndex) div.classList.add('active');

    div.onclick = () => {
      playVideo(idx);
      sidebar.classList.remove('visible');
    };

    channelList.appendChild(div);
  });
}

// Play selected video
function playVideo(idx) {
  if (idx < 0 || idx >= channels.length) return;

  currentIndex = idx;
  const item = channels[idx];

  nowPlaying.textContent = item.title;
  showUI();

  // Reset video element
  video.pause();
  video.src = '';
  video.removeAttribute('src');
  video.load();

  // Most archive.org MP4s support seeking well
  video.src = item.url;
  video.play().catch(e => {
    console.warn("Autoplay prevented or failed", e);
    nowPlaying.textContent = item.title + " (tap to play)";
  });

  // Highlight active item
  document.querySelectorAll('.channel').forEach(el => {
    el.classList.toggle('active', Number(el.dataset.idx) === idx);
  });
}

// ─── Event listeners ────────────────────────────────
menuBtn.onclick = () => sidebar.classList.toggle('visible');

searchInput.oninput = renderList;

// Auto-show UI on interaction
['mousemove', 'keydown', 'touchstart'].forEach(ev =>
  document.addEventListener(ev, showUI)
);

// Hide UI after inactivity (except when sidebar is open)
let hideTimeout;
function scheduleHide() {
  clearTimeout(hideTimeout);
  hideTimeout = setTimeout(hideUI, 4500);
}
document.addEventListener('mousemove', scheduleHide);
document.addEventListener('keydown', scheduleHide);
document.addEventListener('touchstart', scheduleHide);

// Close sidebar when clicking outside
document.addEventListener('click', e => {
  if (sidebar.classList.contains('visible') &&
      !sidebar.contains(e.target) &&
      e.target !== menuBtn) {
    sidebar.classList.remove('visible');
  }
});

// Keyboard: M = toggle menu
document.addEventListener('keydown', e => {
  if (e.key.toLowerCase() === 'm') {
    e.preventDefault();
    sidebar.classList.toggle('visible');
  }
});
</script>
</body>
</html>
